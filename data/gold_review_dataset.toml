batch_id = "batch-001"
review_type = "software"
review_id = "69849efa3dc36dbedb04c1a2"
historical_status = "Rejected"
case_tags = ["first_time_reviewer", "identity_match", "company_website_present"]
gold_label = "approve"
gold_reject_reason = ""
gold_risk_flags = ["historical_reject_disagreement", "linkedin_missing"]
evidence_used = ["mongo_review", "mysql_user", "reviewer_history", "company_website"]
final_decision = "verified_with_minor_fixes"
decision_summary = "Approve. Review content is specific and reviewer identity aligns cleanly with the MySQL account and website evidence despite the historical rejection."
reasoning_markdown = """
Approve.
The review text is coherent, product-specific, and not obviously templated or promotional.
The submitted identity matches the MySQL user record on name, email, company, and role.
The reviewer appears first-time before this record, so there is no bad prior pattern to explain the historical rejection.
External website evidence supports the business identity, but the lack of LinkedIn keeps this as a cautious pass rather than a perfect-confidence case.
"""
verification_status = "pending"
reviewed_by = ""
reviewed_at = ""
notes = "Good disagreement case: historical rejection but current evidence looks sufficient for approval."

