# GoodFirms gold adjudication dataset
# This file is the manually verified source of truth for agent evaluation.
# Historical platform status is recorded for context only and must not be treated as gold truth.

[dataset]
name = "goodfirms_gold_review_dataset"
version = "0.1.0"
status = "draft"
owner = "goodfirms-agent"
batch_size = 10
created_at = "2026-03-11"
updated_at = "2026-03-11"

[guidelines]
purpose = "Manually adjudicated evaluation dataset for review-decision and review-rewrite testing."
adjudication_rule = "Gold labels must reflect the best current human judgment, not the historical GoodFirms moderation outcome."
verification_process = "Each record is prepared in batches of 10, then manually reviewed and corrected before being considered verified."

[label_definitions]
approve = "Review should be accepted."
reject = "Review should be rejected."
manual_review = "Review is too ambiguous for direct approval or rejection and should be flagged for human review."

[reject_reason_definitions]
unable_to_verify_reviewer = "Unable to verify the reviewer"
only_clients_allowed = "Reviews are accepted only from clients of the company"
former_employees_not_allowed = "Reviews are not accepted from former employees"
already_published_before = "Review has already been published before"
other = "Another validated reject reason outside the current standard enum"

[verification_status_definitions]
pending = "Prepared but not yet manually checked"
verified = "Manually checked and confirmed"
corrected = "Prepared label was changed during manual review and is now confirmed"
disputed = "Needs another pass because the case is still unclear"

[case_definitions]
user_with_previously_approved_review = "Reviewer has at least one previously approved review before the current review."
user_with_previously_rejected_review = "Reviewer has at least one previously rejected review before the current review."
first_time_reviewer = "Reviewer has no earlier reviews before the current review."
account_not_found = "No matching GoodFirms user account was found for the review user id or reviewer identity."
identity_match = "Review-submitted identity aligns with the fetched account/profile identity."
identity_mismatch = "Review-submitted identity conflicts with the fetched account/profile identity."
generic_email_domain = "Reviewer email uses a generic domain such as gmail.com or yahoo.com."
linkedin_present = "A profile link is present in review data or account enrichment."
company_website_present = "A company website is present in review data or account enrichment."
self_promotional_tone = "Review text appears promotional, vendor-like, or marketing-heavy."
templated_or_repetitive_text = "Review text appears reused, generic, or too similar to other reviews."
duplicate_risk = "There is evidence or suspicion that the review duplicates earlier submitted content."
borderline_manual_review = "Case is borderline and requires manual adjudication rather than clear approval or rejection."
strong_trust_signal = "Case contains unusually strong positive trust signals such as is_goodfirms_registered or consistent verified history."

# One batch groups 10 reviews prepared together for manual verification.
[[batches]]
batch_id = "batch-001"
status = "prepared"
prepared_by = "codex"
prepared_at = "2026-03-11"
notes = "Candidate gold batch prepared from pre-2026-02-17 02:26:06 UTC Mongo/MySQL records with mixed software/service coverage and targeted external corroboration."

# Each review entry belongs to one batch.
# Keep reasoning concise but explicit.
#
# Fields:
# - review_type: "software" or "service"
# - historical_status: original platform state such as Pending, Approved, Published, Rejected
# - case_tags: one or more values from [case_definitions]
# - gold_label: approve | reject | manual_review
# - gold_reject_reason: use one of the standard reject reasons above, or omit if not rejecting
# - gold_risk_flags: compact machine-readable flags explaining the case
# - evidence_used: what was actually checked to reach the decision
# - decision_summary: short text explaining the final conclusion and basis
# - verification_status: pending | verified | corrected | disputed
#
# Example entry:
#
# [[reviews]]
# batch_id = "batch-001"
# review_type = "software"
# review_id = "69676145bb73ee8562046452"
# historical_status = "Approved"
# case_tags = ["user_with_previously_approved_review", "generic_email_domain", "linkedin_present"]
# gold_label = "approve"
# gold_reject_reason = ""
# gold_risk_flags = ["generic_email_domain"]
# evidence_used = ["review_text", "db_profile", "reviewer_history", "linkedin"]
# final_decision = "verified_pass"
# decision_summary = "Approve. Reviewer identity is sufficiently credible and the review is internally consistent."
# reasoning_markdown = """
# Approve.
# The review is specific, coherent, and aligned with the ratings.
# Reviewer history and external signals do not show a concerning pattern.
# """
# verification_status = "pending"
# reviewed_by = ""
# reviewed_at = ""
# notes = ""

